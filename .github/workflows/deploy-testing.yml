name: Deploy → Testing (GCP)

# Auto-deploys to the GCP testing VM (http://34.14.181.77) on every push to
# main. Build happens here on the runner (clean env, no VM RAM ceiling), then
# the prebuilt .next + source are rsynced over SSH and the service restarts.
#
# The SQLite DB, env file, and Google credentials live ONLY on the VM and are
# never touched — they're excluded from rsync.

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual re-deploy from the Actions tab

concurrency:
  group: deploy-testing       # never run two testing deploys at once
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testing      # GitHub Environment (no approval gate on testing)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install + build
        run: |
          npm ci
          npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TESTING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.TESTING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync build → VM
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next/cache' \
            --exclude 'fnb-controller.db' \
            --exclude 'fnb-controller.db-shm' \
            --exclude 'fnb-controller.db-wal' \
            --exclude 'fnb-controller.db.bak*' \
            --exclude 'backups' \
            --exclude 'aws-migration' \
            --exclude '.claude' \
            ./ "${{ secrets.TESTING_SSH_USER }}@${{ secrets.TESTING_SSH_HOST }}:${{ secrets.TESTING_APP_DIR }}/"

      - name: Install deps + restart service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.TESTING_SSH_USER }}@${{ secrets.TESTING_SSH_HOST }}" \
            "cd ${{ secrets.TESTING_APP_DIR }} && npm install --omit=dev --no-audit --no-fund && npm rebuild better-sqlite3 && sudo systemctl restart fnb-controller"

      - name: Health probe
        run: |
          sleep 4
          ssh -i ~/.ssh/deploy_key "${{ secrets.TESTING_SSH_USER }}@${{ secrets.TESTING_SSH_HOST }}" \
            "systemctl is-active fnb-controller && curl -s -o /dev/null -w 'http: %{http_code}\n' http://127.0.0.1:3000/api/build-info"
