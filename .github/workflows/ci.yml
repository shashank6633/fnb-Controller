name: CI

# Runs on every push and every PR. Catches type errors + build breaks BEFORE
# anything is deployed to a VM. Fast feedback — no secrets, no deploy.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build (Next.js)
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # Build must not require real secrets — the app reads Google creds at
          # RUNTIME from the VM, not at build time. If a build ever needs an env
          # var, add it here as a dummy so CI stays green.
          NEXT_TELEMETRY_DISABLED: '1'
