name: Deploy FNB Controller

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e                                   # abort on any error — never restart on a failed build
            cd /var/www/fnb-controller

            git pull origin main

            npm install

            # Ensure a swap file exists so a heavy `next build` can't exhaust RAM
            # and take the whole instance down (which happened 2026-07-01 — the box
            # became unreachable on ALL ports). Idempotent: created only once, and
            # persisted in /etc/fstab so it survives reboots.
            if ! sudo swapon --show 2>/dev/null | grep -q '/swapfile'; then
              echo "Creating 2G swap file…"
              sudo fallocate -l 2G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
              grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            # The app runs as root (sudo pm2), so the running server leaves
            # root-owned files inside .next that a user-run `next build` can't
            # overwrite → EACCES build failure (favicon.ico.body, *.rsc, ...).
            # Take ownership FIRST, then remove, so the build user can always
            # clean and recreate .next. This breaks the recurring-EACCES cycle.
            sudo chown -R "$(whoami)" .next 2>/dev/null || true
            rm -rf .next

            npm run build                            # if this fails, set -e stops here (no broken restart)

            sudo pm2 restart fnb-controller --update-env
            sudo pm2 save
