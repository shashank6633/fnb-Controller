name: Deploy FNB Controller

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # npm install + next build on the box takes ~10 min — the action's
          # default command_timeout (10m) killed the session right at the finish
          # line on 2026-07-04 (build succeeded, run reported "failure"). Give it
          # comfortable headroom so a slow install can't kill a deploy mid-build.
          command_timeout: 25m

          script: |
            set -e                                   # abort on any error — never restart on a failed build
            cd /var/www/fnb-controller

            git pull origin main

            npm install

            # Ensure plenty of swap so a heavy `next build` can't OOM-kill the box
            # (2026-07-01 it took the instance down on all ports; 2026-07-04 a lone
            # 2G swapfile proved too small and the build was `Killed`). Idempotent:
            # each swapfile is created once and persisted in /etc/fstab. We add a
            # SECOND file rather than resize because the first may already exist.
            ensure_swap() {
              local f="$1" sz="$2"
              if ! sudo swapon --show 2>/dev/null | grep -q "$f"; then
                echo "Adding swap $f ($sz)…"
                sudo fallocate -l "$sz" "$f" 2>/dev/null || sudo dd if=/dev/zero of="$f" bs=1M count=$(( ${sz%G} * 1024 ))
                sudo chmod 600 "$f" && sudo mkswap "$f" && sudo swapon "$f"
                grep -q "$f" /etc/fstab || echo "$f none swap sw 0 0" | sudo tee -a /etc/fstab
              fi
            }
            ensure_swap /swapfile  2G
            ensure_swap /swapfile2 4G     # headroom so next build never OOMs
            free -h 2>/dev/null | grep -i swap || true

            # The app runs as root (sudo pm2), so the running server leaves
            # root-owned files inside .next that a user-run `next build` can't
            # overwrite → EACCES build failure (favicon.ico.body, *.rsc, ...).
            # Take ownership FIRST, then remove, so the build user can always
            # clean and recreate .next. This breaks the recurring-EACCES cycle.
            sudo chown -R "$(whoami)" .next 2>/dev/null || true
            rm -rf .next

            # Cap the V8 heap (same as GCP's known-good local build) so Node uses
            # swap gracefully instead of ballooning; set -e stops here on failure.
            NODE_OPTIONS="--max-old-space-size=4096" npm run build

            sudo pm2 restart fnb-controller --update-env
            sudo pm2 save
