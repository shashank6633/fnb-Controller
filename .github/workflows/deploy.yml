name: Deploy FNB Controller

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e                                   # abort on any error — never restart on a failed build
            cd /var/www/fnb-controller

            git pull origin main

            npm install

            # Clear any stale/root-owned .next so `next build` can clean it
            # (a leftover root-owned file here caused an EACCES build failure → 502).
            sudo rm -rf .next

            npm run build                            # if this fails, set -e stops here (no broken restart)

            sudo pm2 restart fnb-controller --update-env
            sudo pm2 save
