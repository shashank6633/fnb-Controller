name: Deploy FNB Controller

on:
  workflow_dispatch:

# Never let two deploys race each other on the box (the old on-box-build flow
# had exactly this failure mode when a retry was fired mid-run).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. BUILD ON THE RUNNER ────────────────────────────────────────
      # `next build` on the small Lightsail box OOM-ground for 25-45 min and
      # raced the running root pm2 process for .next ownership (recurring
      # EACCES). The runner has 16GB RAM and builds in a few minutes; the box
      # now only receives the finished artifact and restarts.
      - name: Checkout (tip of main at dispatch time = GITHUB_SHA)
        uses: actions/checkout@v4

      # Node 20 matches the box: deploy/aws/vm-setup.sh installs Node 20 via
      # NodeSource ("▶ 2/7 — Node.js 20") and deploy/aws/RUNBOOK.md confirms.
      # (Those scripts are otherwise stale, but they are the Node evidence we
      # have — and 20 is the LTS fallback regardless.) The .next artifact is
      # plain JS, but keeping majors aligned avoids surprises; node_modules
      # (incl. native better-sqlite3) stays box-built and is never shipped.
      - name: Setup Node 20 (matches box Node major)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      # .next/cache is the compiler cache — big and unused by `next start`.
      # Everything else (BUILD_ID, *-manifest.json, required-server-files.json,
      # server/, static/) ships. Verified locally: this tarball alone, dropped
      # into the repo, boots `next start` and serves /api/build-info.
      - name: Pack build artifact
        run: |
          test -f .next/BUILD_ID
          test -f .next/required-server-files.json
          tar -czf next-build.tgz --exclude='.next/cache' .next
          ls -lh next-build.tgz

      # ── 2. TRANSFER ───────────────────────────────────────────────────
      - name: Upload artifact to Lightsail
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: next-build.tgz
          target: /tmp/
          overwrite: true

      # ── 3. ACTIVATE ON THE BOX ────────────────────────────────────────
      # set -e everywhere: any failure aborts BEFORE pm2 restart, so a broken
      # transfer/checkout can never take down the running build. The old .next
      # is kept as .next.bak for one-command manual rollback.
      - name: Activate on Lightsail
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: GITHUB_SHA
          # No on-box build any more — npm install + untar + restart only.
          command_timeout: 15m
          script: |
            set -e                                   # abort on any error — never restart on a broken deploy
            cd /var/www/fnb-controller

            # Code on the box MUST match the commit the runner built, or the
            # runtime source (public/, next.config, API routes' expectations)
            # drifts from the artifact. Verify BEFORE touching anything.
            git fetch origin main
            if [ "$(git rev-parse origin/main)" != "$GITHUB_SHA" ]; then
              echo "ABORT: origin/main is $(git rev-parse --short origin/main) but the runner built $GITHUB_SHA."
              echo "main moved between dispatch and deploy — re-run the workflow."
              exit 1
            fi
            git merge --ff-only "$GITHUB_SHA"

            # Verify the artifact actually landed before touching node_modules
            # or the live .next.
            test -s /tmp/next-build.tgz

            # Same npm install as before (NOT --omit=dev): node_modules stays
            # box-built so the native better-sqlite3 binding always matches
            # the box's OS/Node — we never ship node_modules from the runner.
            npm install

            # Stage-extract on the same filesystem so the final swap is a pure
            # rename. A corrupt/partial tarball fails HERE, with the live
            # .next untouched and pm2 still serving the old build.
            rm -rf .next.stage
            mkdir .next.stage
            tar -xzf /tmp/next-build.tgz -C .next.stage
            test -f .next.stage/.next/BUILD_ID
            test -f .next.stage/.next/required-server-files.json

            # mv-swap: keep the previous build as .next.bak. The running pm2
            # process (root) holds the old dir open — rename doesn't disturb
            # it; it serves the old build until the restart below. Rollback:
            #   sudo mv .next .next.broken && sudo mv .next.bak .next \
            #     && sudo pm2 restart fnb-controller
            sudo rm -rf .next.bak
            if [ -d .next ]; then sudo mv .next .next.bak; fi
            sudo mv .next.stage/.next .next
            rmdir .next.stage
            rm -f /tmp/next-build.tgz

            # Only reached when checkout + install + untar ALL succeeded.
            sudo pm2 restart fnb-controller --update-env
            sudo pm2 save
