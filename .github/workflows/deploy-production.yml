name: Deploy → Production (AWS)

# Ships to the AWS production box behind https://fnb.akanhyd.com.
#
# Triggered MANUALLY (workflow_dispatch) or by pushing a release tag (v*).
# Gated by the GitHub "production" Environment, which you configure with a
# REQUIRED REVIEWER — so a human must click Approve before it runs. This is
# your safety gate: nothing reaches real users without an explicit approval.
#
# Before deploying it takes a fresh SQLite backup on the box (belt + braces),
# then builds on the runner and rsyncs. The live DB / env / Google creds on
# the VM are never overwritten.

on:
  workflow_dispatch:           # the "Run workflow" button in the Actions tab
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production release'
        required: true
        default: ''
  push:
    tags: ['v*']               # e.g. git tag v1.4.0 && git push --tags

concurrency:
  group: deploy-production      # never two prod deploys at once
  cancel-in-progress: false

jobs:
  guard:
    # Cheap gate that rejects an accidental manual run without the confirm word.
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'deploy'
        run: |
          echo "::error::Type 'deploy' in the confirm box to release to production."
          exit 1

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    environment: production     # ← attach required-reviewer protection here
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install + build
        run: |
          npm ci
          npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pre-deploy DB backup (on the VM)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "if [ -f ${{ secrets.PROD_APP_DIR }}/deploy/aws/backup-db.sh ]; then \
               BUCKET='${{ secrets.PROD_BACKUP_BUCKET }}' bash ${{ secrets.PROD_APP_DIR }}/deploy/aws/backup-db.sh || echo 'backup script failed (continuing)'; \
             else echo 'no backup script yet (first deploy)'; fi"

      - name: Rsync build → VM
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next/cache' \
            --exclude 'fnb-controller.db' \
            --exclude 'fnb-controller.db-shm' \
            --exclude 'fnb-controller.db-wal' \
            --exclude 'fnb-controller.db.bak*' \
            --exclude 'backups' \
            --exclude 'aws-migration' \
            --exclude '.claude' \
            ./ "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_APP_DIR }}/"

      - name: Install deps + restart service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd ${{ secrets.PROD_APP_DIR }} && npm install --omit=dev --no-audit --no-fund && npm rebuild better-sqlite3 && sudo systemctl restart fnb-controller"

      - name: Health probe
        run: |
          sleep 4
          ssh -i ~/.ssh/deploy_key "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "systemctl is-active fnb-controller && curl -s -o /dev/null -w 'http: %{http_code}\n' http://127.0.0.1:3000/api/build-info"
