<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>F&amp;B Controller — Offline</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#af4408">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           background: #FFF8F0; color: #2D1B0E; margin: 0;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 360px; text-align: center; }
    .badge { width: 64px; height: 64px; border-radius: 16px; background: #af4408;
             color: #FFF8F0; display: inline-flex; align-items: center; justify-content: center;
             font-size: 28px; font-weight: 800; margin-bottom: 16px; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p  { font-size: 13px; color: #6B5744; margin: 4px 0 16px; line-height: 1.5; }
    button { background: #af4408; color: white; border: none; padding: 10px 16px;
             border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #8a3506; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">F&amp;B</div>
    <h1>You're offline</h1>
    <p>Reconnect to load the latest data — recipes, sales and inventory all need a live connection.</p>
    <p>Anything you've already opened today is cached and will keep working.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
