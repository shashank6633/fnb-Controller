# nginx config for F&B Controller — reverse proxies port 80 to Next.js on 3000.
# Preserves the original IP and protocol so getClientIp() works inside Next.js.
# Symlinked into /etc/nginx/sites-enabled/ by vm-setup.sh.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large Recaho .xlsx + recipe .xlsx uploads
    client_max_body_size 25M;

    # Quiet a noisy 404 some browsers fire
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Health check that doesn't go through Next.js (for uptime monitors)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Enough for slow Recaho parsing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
