# nginx config for F&B Controller on AWS EC2 — reverse-proxies :80 → Next.js :3000.
#
# Setup:
#   sudo cp deploy/aws/nginx.conf /etc/nginx/sites-available/fnb-controller
#   sudo ln -sf /etc/nginx/sites-available/fnb-controller /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# After DNS points your domain at the Elastic IP, add HTTPS with:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# certbot rewrites this file to add the :443 server block + auto-renews.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;          # replace _ with yourdomain.com once DNS is live

    # Allow large Recaho .xlsx + recipe .xlsx uploads
    client_max_body_size 25M;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Plain health check for uptime monitors / ALB target group (bypasses Next.js)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
